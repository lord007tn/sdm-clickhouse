name: Stale

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale issues/PRs
        uses: actions/stale@v9
        with:
          stale-issue-message: "This issue is stale. Please update it within 14 days or it will be closed."
          stale-pr-message: "This PR is stale. Please update it within 14 days or it will be closed."
          close-issue-message: "Closing stale issue due to inactivity."
          close-pr-message: "Closing stale PR due to inactivity."
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          remove-stale-when-updated: true
          operations-per-run: 200
          exempt-issue-labels: "security,pinned,priority/high"
          exempt-pr-labels: "security,pinned,priority/high,do-not-close"
